<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons. Google needs a non-SVG file at least 48x48 to display in
         search results, so we serve PNG + ICO alongside the SVG. -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Bluechips London — Premium Companion Directory</title>
    <meta name="description" content="London's most exclusive companion directory. Verified, discreet, premium. Browse independent companion listings across all London boroughs." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph defaults (overridden per-page by react-helmet-async) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bluechips London" />
    <meta property="og:title" content="Bluechips London — Premium Companion Directory" />
    <meta property="og:description" content="London's most exclusive companion directory. Verified, discreet, premium. Browse independent companion listings across all London boroughs." />
    <meta property="og:url" content="https://bluechips.live/" />
    <meta property="og:image" content="https://bluechips.live/og-default.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bluechips London — Premium Companion Directory" />
    <meta name="twitter:description" content="London's most exclusive companion directory. Verified, discreet, premium." />
    <meta name="twitter:image" content="https://bluechips.live/og-default.jpg" />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://bluechips.live" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
