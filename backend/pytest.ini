[pytest]
testpaths = tests
asyncio_mode = auto
addopts =
    -ra
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:.coverage_html
    --cov-fail-under=95
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    integration: cross-router multi-step flows
    security: negative-path security tests
    slow: tests that take >1s
env =
    APP_ENV=test
    SECRET_KEY=test-secret-key-for-pytest-only-not-prod
    DATABASE_URL=sqlite+aiosqlite:///:memory:
    STRIPE_SECRET_KEY=sk_test_dummy
    STRIPE_PUBLISHABLE_KEY=pk_test_dummy
    STRIPE_WEBHOOK_SECRET=whsec_test_dummy
    SMTP_USER=
    AWS_ACCESS_KEY_ID=
    AWS_SECRET_ACCESS_KEY=
    ADMIN_EMAIL=admin@test.local
    ADMIN_INITIAL_PASSWORD=admin-test-pass
    LOCAL_UPLOADS_DIR=/tmp/bluechips-test-uploads
