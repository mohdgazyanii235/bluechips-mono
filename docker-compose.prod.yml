services:
  db:
    image: postgres:16-alpine
    container_name: bluechips_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed on host — only reachable within the Docker network

  redis:
    image: redis:7-alpine
    container_name: bluechips_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed on host — only reachable within the Docker network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bluechips_backend
    restart: unless-stopped
    env_file: ./backend/.env.prod
    ports:
      - "127.0.0.1:8001:8000"   # Loopback only — Nginx proxies from outside
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
