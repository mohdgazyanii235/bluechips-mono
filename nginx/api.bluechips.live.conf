# /etc/nginx/sites-available/bluechips-api
# Copy this file to /etc/nginx/sites-available/bluechips-api on your EC2 server
# then: sudo ln -s /etc/nginx/sites-available/bluechips-api /etc/nginx/sites-enabled/
#
# This config exposes api.bluechips.live → Docker backend on localhost:8001
# The frontend lives on Vercel (bluechips.live) — no static files served here.

# Rate limit zones (lives in http context via sites-enabled include)
limit_req_zone $binary_remote_addr zone=bluechips_api:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=bluechips_auth:10m rate=10r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.bluechips.live;

    # Required for certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — API
server {
    listen 443 ssl http2;
    server_name api.bluechips.live;

    ssl_certificate     /etc/letsencrypt/live/api.bluechips.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bluechips.live/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 25M;

    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "DENY"                          always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000"            always;

    # All traffic → Docker backend on loopback port 8001
    location / {
        limit_req zone=bluechips_api burst=40 nodelay;

        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Stricter limit on auth endpoints
    location /api/auth/ {
        limit_req zone=bluechips_auth burst=15 nodelay;

        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Stripe webhooks — no rate limit so Stripe isn't blocked
    location /api/webhooks/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
